services:
  db:
    image: postgres:15
    container_name: antiberojgar-db
    environment:
      POSTGRES_USER: antiberojgar
      POSTGRES_PASSWORD: password
      POSTGRES_DB: antiberojgar
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: antiberojgar-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    depends_on:
      - db
    restart: unless-stopped

  mcp_jobs:
    build:
      context: ./backend
      dockerfile: Dockerfile.mcp
    container_name: antiberojgar-mcp-jobs
    ports:
      - "8005:8005"
    env_file:
      - ./backend/.env
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: antiberojgar-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
